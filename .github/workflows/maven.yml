name: Java CI

on:
  push:
    branches:
      - main
      - 'feature/**'

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: mvn clean package
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: tic-tac-toe-jar
          path: target/*.jar
